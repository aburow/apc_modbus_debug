rules:
  - id: ai-slop.python.naked-except
    languages:
      - python
    severity: ERROR
    message: Avoid bare or overly broad exception handlers in diagnostic tooling.
    patterns:
      - pattern-either:
          - pattern: |
              try:
                ...
              except:
                ...
          - pattern: |
              try:
                ...
              except Exception:
                ...
          - pattern: |
              try:
                ...
              except Exception as $EXC:
                ...

  - id: ai-slop.python.generic-function-name
    languages:
      - python
    severity: WARNING
    message: Replace placeholder function names with device- or behavior-specific names.
    patterns:
      - pattern-either:
          - pattern: |
              def process_data(...):
                ...
          - pattern: |
              def handle_response(...):
                ...
          - pattern: |
              def get_result(...):
                ...
          - pattern: |
              def do_thing(...):
                ...

  - id: ai-slop.python.vague-todo
    languages:
      - python
    severity: WARNING
    message: TODO comment is too vague to be actionable.
    patterns:
      - pattern-regex: '(?i)#\s*todo\b(?![^#\n]*\b(apc|modbus|snmp|oid|register|device|smx|smt|srt|ap96)\b)'

  - id: ai-slop.python.hedge-words
    languages:
      - python
    severity: WARNING
    message: Avoid AI-style hedge wording in comments and user-facing strings.
    patterns:
      - pattern-regex: '(?i)(robust|seamless|leverage|cutting-edge|powerful|you might want to|consider using|it''s worth noting|note that)'

  - id: ai-slop.python.obvious-comment
    languages:
      - python
    severity: WARNING
    message: Remove comments that merely restate the code without adding context.
    patterns:
      - pattern-regex: '(?im)^\s*#\s*(return|set|assign|initialize|create|parse|decode|check|get|call|print)\b(?:[^\n]*)$'
